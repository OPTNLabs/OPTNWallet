name: Android Release (Signed AAB)
on:
  push:
    tags: ['v*.*.*']   # tag like v1.5.0
  workflow_dispatch:

jobs:
  aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write

    concurrency:
      group: android-release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main" || {
            echo "Release tag must point to a commit reachable from main."
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Quality gate
        run: npm run lint:core && npm run typecheck:core && npm run test:core

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # ---- Signing: map your GitHub secrets to the env your app/build.gradle expects ----
      - name: Report signing secret availability
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ] && [ -n "$STORE_PASS" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASS" ]; then
            echo "Android signing secrets are present; building signed release artifacts."
          else
            echo "Android signing secrets are missing; building unsigned release artifacts."
          fi

      - name: Prepare keystore file
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      - name: Build Signed Release AAB
        env:
          # app/build.gradle expects RELEASE_* envs
          RELEASE_STORE_FILE: keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run android:aab:prod

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/**/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build Signed Release APK
        env:
          # app/build.gradle expects RELEASE_* envs
          RELEASE_STORE_FILE: keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run android:apk:prod

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/**/outputs/apk/release/*.apk
          retention-days: 30

      - name: Generate checksums
        run: |
          {
            sha256sum android/**/outputs/bundle/release/*.aab
            sha256sum android/**/outputs/apk/release/*.apk
          } > android/release-sha256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: app-release-checksums
          path: android/release-sha256.txt
          retention-days: 30

      - name: Attest release bundle provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            android/**/outputs/bundle/release/*.aab
            android/**/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/**/outputs/bundle/release/*.aab
            android/**/outputs/apk/release/*.apk
            android/release-sha256.txt
