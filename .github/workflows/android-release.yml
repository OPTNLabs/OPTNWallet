name: Android Release (Signed AAB)
on:
  push:
    tags: ['v*.*.*']   # tag like v1.5.0

jobs:
  aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # ---- Signing: map your GitHub secrets to the env your app/build.gradle expects ----
      - name: Prepare keystore file
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      - name: Build Signed Release AAB
        working-directory: android
        env:
          # app/build.gradle expects RELEASE_* envs
          RELEASE_STORE_FILE: keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon clean bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/**/outputs/bundle/release/*.aab
