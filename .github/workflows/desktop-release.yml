name: Desktop Release

# Mirrors the structure of android-release.yml:
# - Triggered by the same v*.*.* tags on main
# - Same quality gates (lint, typecheck, test)
# - Produces signed installers for Windows, macOS, Linux
# - Creates a GitHub Release alongside the Android AAB release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.6.2)'
        required: true
        default: 'v1.6.2'

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ─── Desktop builds (Windows, macOS, Linux) ────────────────────────────────
  # This workflow only compiles + packages the desktop app and publishes a draft
  # release. Full lint/typecheck/test live in ci.yml (web) and desktop-preview.yml.
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    timeout-minutes: 60
    env:
      # macOS runners OOM on the Vite frontend build at Node's default heap.
      NODE_OPTIONS: --max-old-space-size=4096
      # Exposed at job level so the signing step's `if` can test for its presence.
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: optn-wallet-windows
            bundle-ext: '*.exe'

          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-name: optn-wallet-macos-arm
            bundle-ext: '*.dmg'

          # macos-13 (Intel) omitted: scarce runners stall the release. Apple
          # Silicon covers modern Macs; re-add x86_64-apple-darwin if Intel is needed.

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: optn-wallet-linux
            bundle-ext: '*.AppImage'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify release commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main" || {
            echo "Release commit must be reachable from main."
            exit 1
          }

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization (optional — remove if not notarizing yet)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional — remove if not signing yet)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 'OPTN Wallet ${{ github.event_name == ''workflow_dispatch'' && inputs.tag || github.ref_name }}'
          releaseBody: |
            ## OPTN Wallet ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.exe` installer |
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux | `.AppImage` |
            | Android | See [Android release](${{ github.server_url }}/${{ github.repository }}/releases) |

            ### Checksums
            SHA256 checksums are attached to this release.
          releaseDraft: false
          prerelease: false
          # Run the Tauri CLI via npx — the project has no "tauri" npm script,
          # so tauri-action's default `npm run tauri` fails. npx works on the
          # fork and upstream/main alike (no package.json change required).
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/${{ matrix.bundle-ext }}
          retention-days: 30
          if-no-files-found: warn

  # ─── Checksums + attestation (mirrors android-release.yml) ─────────────────
  attest-and-checksum:
    name: Attest & Checksum
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate SHA256 checksums
        run: |
          find artifacts/ -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) \
            -exec sha256sum {} \; > checksums-desktop.txt
          cat checksums-desktop.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-desktop
          path: checksums-desktop.txt
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          # @actions/glob does not expand brace patterns; list each glob on its own line.
          # Matches the per-platform artifacts uploaded above (bundle-ext).
          subject-path: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
