name: Android Preview (Debug APK)
on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/**'
      - 'android/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite.config.*'
      - '.github/workflows/android-preview.yml'
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'android/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite.config.*'
      - '.github/workflows/android-preview.yml'

permissions:
  contents: read

concurrency:
  group: android-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: npm run android:apk:dev

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/**/outputs/apk/debug/*.apk
          retention-days: 14
