<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Remove favicon to avoid asset 404s inside Android assets.
         Re-add later pointing to a real file in /public if you like. -->
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->

    <!-- viewport-fit=cover lets CSS safe-area env() work properly -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>optn-wallet</title>

    <style>
      /* html { background:#101828; } */
      /* Prevent body scroll flash before React mounts */
      html, body, #root { height: 100%; margin:0; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Minimal runtime shim to satisfy libs touching `process`/`global` -->
    <script>
      (function () {
        window.global  = window.global || window;
        window.process = window.process || { env: {} };
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
